# this is a basic project that does not use an LLM to generate any text;
# it is useful for debugging / testing purposes because it:
# 1. ensures deterministic results
# 2. does not result in API charges

"outline.json":
  cmd: cp basic.json outline.json
  dependencies:
    basic.json
    deps/a
    deps/b

"sub$LEVEL1/outline.json":
  cmd:
    cp basic.json sub$LEVEL1/outline.json
  dependencies:
    outline.json
  variables:
    LEVEL1:
      jq -r 'range(0; .sections | length)' outline.json

"sub$LEVEL1/sub$LEVEL2/outline.json":
  cmd:
    cp basic.json sub$LEVEL1/sub$LEVEL2/outline.json
  dependencies:
    outline.json
    sub$LEVEL1/outline.json
  variables:
    LEVEL1:
      jq -r 'range(0; .sections | length)' outline.json
    LEVEL2:
      jq -r "range(0; [.sections | length, $(($LEVEL1 + 1))] | min )" sub$LEVEL1/outline.json

"final.txt":
  cmd:
    echo hello > "final.txt"
  dependencies:
    sub$LEVEL1/sub$LEVEL2/outline.json

################################################################################
# NEW TARGETS
################################################################################
# This test case adds a number of targets that test the ability for
# dependencies to use variables that are not contained within the target.
# Our working example is creating a "summary" of the the nested objects.
# That is, for each LEVEL1, loop over all of the corresponding LEVEL2 targets.
################################################################################

# this example does not define the $LEVEL2 variable
# and relies on pattern matching with the appropriate target
"sub$LEVEL1/summary_NOVAR.md":
  cmd: |
    # NOTE:
    # using the glob is always a bit dangerous because the files matched can include many more than what were actually build in the dependencies;
    # in this case it is necessary because we don't have a variable defined to match,
    # but the cases below all avoid the glob
    cat sub$LEVEL1/*/outline.json > "sub$LEVEL1/summary_NOVAR.md"

    # NOTE:
    # the cat command above is sufficient for "generating" the summary file;
    # but the test cases will check only the files created and not their contents;
    # therefore to ensure that the correct files are getting included in the dependencies list,
    # we need to put them in a folder somewhere
    TEST_DIR=sub$LEVEL1/summary_NOVAR
    mkdir -p $TEST_DIR
    for f in sub$LEVEL1/*/outline.json; do
      touch $TEST_DIR/$(basename $(basename $f))
    done

  dependencies:
    - outline.json
    - sub$LEVEL1/outline.json
    - sub$LEVEL1/sub$LEVEL2/outline.json
  variables:
    LEVEL1:
      jq -r 'range(0; .sections | length)' outline.json

# define the $LEVEL2 variable
# to be exactly the same as the definition from the target
"sub$LEVEL1/summary_SAMEVAR.md":
  cmd: |
    cat $(printf "sub$LEVEL1/sub%s/outline.json " $LEVEL2) \
        > "sub$LEVEL1/summary_SAMEVAR.md"

    TEST_DIR=sub$LEVEL1/summary_SAMEVAR
    mkdir -p $TEST_DIR
    touch $(printf "$TEST_DIR/LEVEL2=%s " $LEVEL2)
  dependencies:
    - outline.json
    - sub$LEVEL1/outline.json
    - sub$LEVEL1/sub$LEVEL2/outline.json
  variables:
    LEVEL1:
      jq -r 'range(0; .sections | length)' outline.json
    LEVEL2:
      jq -r "range(0; [.sections | length, $(($LEVEL1 + 1))] | min )" sub$LEVEL1/outline.json

# define the $LEVEL2 variable
# to be a subset of the definition from the target
"sub$LEVEL1/summary_VARSUBSET.md":
  cmd: |
    cat $(printf "sub$LEVEL1/sub%s/outline.json " $LEVEL2) \
        > "sub$LEVEL1/summary_VARSUBSET.md"

    TEST_DIR=sub$LEVEL1/summary_VARSUBSET
    mkdir -p $TEST_DIR
    touch $(printf "$TEST_DIR/LEVEL2=%s " $LEVEL2)
  dependencies:
    - outline.json
    - sub$LEVEL1/outline.json
    - sub$LEVEL1/sub$LEVEL2/outline.json
  variables:
    LEVEL1:
      jq -r 'range(0; .sections | length)' outline.json
    LEVEL2: |
      seq 0 $((3 < $LEVEL1 ? 3 : $LEVEL1))

# use the variable $FOO instead of the variable $LEVEL2
"sub$LEVEL1/summary_FOO.md":
  cmd: |
    cat $(printf "sub$LEVEL1/sub%s/outline.json " $FOO) \
      > "sub$LEVEL1/summary_FOO.md"

    TEST_DIR=sub$LEVEL1/summary_FOO
    mkdir -p "$TEST_DIR"
    touch $(printf "$TEST_DIR/FOO=%s " $FOO)
  dependencies:
    - outline.json
    - sub$LEVEL1/outline.json
    - sub$LEVEL1/sub$FOO/outline.json
  variables:
    LEVEL1:
      jq -r 'range(0; .sections | length)' outline.json
    FOO: |
      seq 0 $((3 < $LEVEL1 ? 3 : $LEVEL1))

########################################

# this test has two non-target variables;
# one of the dependencies contains only non-target variables
"sub$LEVEL1/summary_DEP.md":
  cmd: |
    cat $(printf "sub$LEVEL1/sub%s/outline.json " $LEVEL2) \
        $(printf "deps/%s " $DEP) \
        > "sub$LEVEL1/summary_DEP.md"

    TEST_DIR=sub$LEVEL1/summary_DEP
    mkdir -p $TEST_DIR
    touch $(printf "$TEST_DIR/LEVEL2=%s " $LEVEL2) \
          $(printf "$TEST_DIR/DEP=%s " $DEP)
  dependencies:
    - outline.json
    - deps/$DEP
    - sub$LEVEL1/outline.json
    - sub$LEVEL1/sub$LEVEL2/outline.json
  variables:
    LEVEL1:
      jq -r 'range(0; .sections | length)' outline.json
    LEVEL2: |
      seq 0 $((3 < $LEVEL1 ? 3 : $LEVEL1))
    DEP: |
      if [ $LEVEL1 = 0000 ]; then
        echo a
      elif [ $LEVEL1 = 0001 ]; then
        echo b
      else
        echo a
        echo b
      fi

"deps/$DEP":
  cmd: |
    echo "autobuilt" > deps/$DEP

# this test has empty variables
"sub$LEVEL1/summary_EMPTY.md":
  cmd: |
    cat $(printf "sub$LEVEL1/sub%s/outline.json " $LEVEL2) \
        $(printf "deps/%s " $DEP) \
        > "sub$LEVEL1/summary_EMPTY.md"

    TEST_DIR=sub$LEVEL1/summary_EMPTY
    mkdir -p $TEST_DIR
    touch $(printf "$TEST_DIR/LEVEL2=%s " $LEVEL2) \
          $(printf "$TEST_DIR/DEP=%s " $DEP)
  dependencies:
    - outline.json
    - deps/$DEP
    - sub$LEVEL1/outline.json
    - sub$LEVEL1/sub$LEVEL2/outline.json
  variables:
    LEVEL1:
      jq -r 'range(0; .sections | length)' outline.json
    LEVEL2:
      echo
    DEP: |
      if [ $LEVEL1 = 0000 ]; then
        echo
      elif [ $LEVEL1 = 0001 ]; then
        echo b
      else
        echo a
        echo b
      fi
